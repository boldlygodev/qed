  """qed -f "$SCRIPT" < "$INPUT" 2> "$STDERR" | tee "$OUTPUT" > "$STDOUT" """,
]

[[scenario]]
id = "plus-ignored-on-before"
description = "+ on before() is warned and ignored; the insertion point still fires"
script = "plus-ignored-on-before.qed"
input = "three-lines.txt"
